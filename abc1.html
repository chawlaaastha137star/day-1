<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>business card</title>
    <style>
        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px 0;
        }

        body {
            background-color: grey;

        }

        .container {
            background-color: white;
            width: 75%;
            margin: 40px auto;
            max-width: fit-content;
            padding: 30px;
            border-radius: 10px;
            text-align: center;

        }

        h1 {
            font-size: 22px;
            margin: 10px 0 5px;

        }

        p {
            color: grey;
            font-size: 14px;
            margin-bottom: 15px;

        }

        .btn {
            padding: 10px 15px;
            margin: 5px;
            border: null;
            border-radius: 5px;
            background-color: #202040;
            cursor: pointer;
            font-size: 14px;

        }

        a {
            color: white;
            text-decoration: none;

        }

        .btn:hover {
            background-color: #404070;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Satyansh Softech Pvt. Ltd.</h1>
        <img src="https://hackathon.satyaanshsoftech.com/SatyawanSir.webp" alt="satyansh sir image" class="profile-img">
        <h1>Mr. Satyawan Panchal</h1>
        <p>Founder & CEO</p>
        <p>Web Developer | Corporate Trainer</p>
        <button class="btn">
            <a href="">Follow</a>
        </button>
        <button class="btn">
            <a href="">Linked In</a>
        </button>
        <p>Contact: +91 7082252235</p>

    </div>
</body>

</html>
